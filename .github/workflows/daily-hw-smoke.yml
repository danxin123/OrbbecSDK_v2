name: Daily HW Smoke

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  device-health:
    runs-on: [self-hosted, linux, sdk, usb, gemini-335]
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Device health check
        id: health
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/device_health_check.sh
          if bash scripts/device_health_check.sh; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
            echo "DEVICE_HEALTH=OK" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            echo "[HEALTH FAIL] Device infrastructure not ready." >> "$GITHUB_STEP_SUMMARY"
            echo "[HEALTH FAIL] This is an INFRASTRUCTURE failure, not a test failure." >> "$GITHUB_STEP_SUMMARY"
          fi

  cpp-tests:
    needs: device-health
    if: ${{ needs.device-health.outputs.healthy == 'true' }}
    runs-on: [self-hosted, linux, sdk, usb, gemini-335]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build all test targets
        run: cmake --build build --target ob_nohw_full_test ob_hw_full_test ob_playback_smoke_test -j

      - name: Run no-hardware full test
        run: |
          mkdir -p reports
          BINARY=$(find build -name ob_nohw_full_test -type f | head -n 1)
          echo "Found binary: $BINARY"
          "$BINARY" --gtest_output=xml:reports/nohw_junit.xml

      - name: Run hardware full test
        env:
          HARDWARE_AVAILABLE: "true"
          DEVICE_TYPE: gemini-335
        run: |
          BINARY=$(find build -name ob_hw_full_test -type f | head -n 1)
          echo "Found binary: $BINARY"
          "$BINARY" --gtest_output=xml:reports/hw_junit.xml

      - name: Run playback smoke test
        run: |
          BAG_PATH=$(find tests/rosbag -maxdepth 1 -name '*.bag' | head -n 1)
          if [ -n "$BAG_PATH" ]; then
            BINARY=$(find build -name ob_playback_smoke_test -type f | head -n 1)
            echo "Found binary: $BINARY"
            "$BINARY" "$BAG_PATH"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-hw-reports-${{ github.run_id }}
          path: reports/*.xml
          retention-days: 30

  infra-summary:
    needs: device-health
    if: ${{ needs.device-health.outputs.healthy != 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Report infra failure
        run: |
          echo "[HEALTH FAIL] Device infrastructure not ready." >> "$GITHUB_STEP_SUMMARY"
          echo "[HEALTH FAIL] This is an INFRASTRUCTURE failure, not a test failure." >> "$GITHUB_STEP_SUMMARY"
          echo "[HEALTH FAIL] Check device connections, power, and runner configuration." >> "$GITHUB_STEP_SUMMARY"
