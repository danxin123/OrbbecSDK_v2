name: Daily HW Smoke

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  device-health:
    runs-on: [self-hosted, linux, sdk, usb, gemini-335]
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Device health check
        id: health
        shell: bash
        run: |
          set -euo pipefail
          if lsusb | grep -q "2bc5"; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
            echo "DEVICE_HEALTH=OK" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            echo "DEVICE_HEALTH=INFRA_FAIL (no Orbbec USB device found)" >> "$GITHUB_STEP_SUMMARY"
          fi

  cpp-hw-smoke:
    needs: device-health
    if: ${{ needs.device-health.outputs.healthy == 'true' }}
    runs-on: [self-hosted, linux, sdk, usb, gemini-335]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build test targets
        run: cmake --build build --target frame_test total_test align_test hdr_test -j

      - name: Run hardware smoke executables
        shell: bash
        run: |
          set -euo pipefail
          ./build/tests/frame_test/frame_test
          ./build/tests/total_test/total_test
          ./build/tests/align_test/align_test
          ./build/tests/hdr_test/hdr_test

  infra-summary:
    needs: device-health
    if: ${{ needs.device-health.outputs.healthy != 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Report infra failure
        run: |
          echo "Daily HW Smoke skipped due to infra issue (device offline or not detected)." >> "$GITHUB_STEP_SUMMARY"
