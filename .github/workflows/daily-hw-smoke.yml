name: Daily HW Smoke

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  discover-hw-runners:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.export.outputs.matrix }}
      has_matrix: ${{ steps.export.outputs.has_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate hw_full_test matrix from global runner pools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/hw_discovery
          python scripts/runner/generate_hw_full_test_matrix.py \
            --runner-pools scripts/runner/runner_pools.json \
            --platform linux_x86_64 \
            --required-capabilities depth,color \
            --output-matrix reports/hw_discovery/hw_matrix.json

      - name: Export matrix output
        id: export
        shell: bash
        run: |
          set -euo pipefail
          MATRIX_JSON=$(python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('reports/hw_discovery/hw_matrix.json').read_text(encoding='utf-8'))
          print(json.dumps(payload, separators=(',', ':')))
          PY
          )
          MATRIX_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('reports/hw_discovery/hw_matrix.json').read_text(encoding='utf-8'))
          print(len(payload))
          PY
          )
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX_COUNT" -gt 0 ]; then
            echo "has_matrix=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_matrix=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize discovery
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          matrix = json.loads(Path('reports/hw_discovery/hw_matrix.json').read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write('## HW Runner Discovery\n')
              summary.write(f"- Matrix jobs: {len(matrix)}\n")
              for item in matrix:
                  summary.write(f"- {item['pool_name']} -> {item['platform']}\n")
          PY

  cpp-tests:
    needs: discover-hw-runners
    if: ${{ needs.discover-hw-runners.outputs.has_matrix == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-hw-runners.outputs.matrix) }}
    name: ${{ matrix.display_name }}
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Device health check
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/device_health_check.sh
          bash scripts/device_health_check.sh

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build non-destructive test targets
        run: cmake --build build --target extensions ob_nohw_full_test ob_hw_full_test --parallel 4

      - name: Run no-hardware full test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports
          BINARY=$(find build -name ob_nohw_full_test -type f | head -n 1)
          if [ -z "$BINARY" ]; then
            echo "ob_nohw_full_test not found under build" >&2
            exit 1
          fi
          echo "Found binary: $BINARY"
          "$BINARY" --gtest_output=xml:reports/nohw_junit.xml 2>&1 | tee reports/nohw.log
          exit ${PIPESTATUS[0]}

      - name: Run non-destructive hardware test
        env:
          HARDWARE_AVAILABLE: "true"
          DEVICE_TYPE: ${{ matrix.pool_name }}
        shell: bash
        run: |
          set -euo pipefail
          BINARY=$(find build -name ob_hw_full_test -type f | head -n 1)
          if [ -z "$BINARY" ]; then
            echo "ob_hw_full_test not found under build" >&2
            exit 1
          fi
          echo "Found binary: $BINARY"
          "$BINARY" --gtest_output=xml:reports/hw_junit.xml 2>&1 | tee reports/hw.log
          exit ${PIPESTATUS[0]}

      - name: Publish daily test report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: reports/*.xml
          check_name: Daily HW Smoke Test Report (${{ matrix.pool_name }})
          detailed_summary: true
          include_passed: true
          require_tests: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-hw-reports-${{ matrix.pool_name }}-${{ github.run_id }}
          path: |
            reports/*.xml
            reports/*.log
          retention-days: 30

  no-runner-summary:
    needs: discover-hw-runners
    if: ${{ needs.discover-hw-runners.outputs.has_matrix != 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Report missing runner mapping
        run: |
          echo "No eligible runner pool found for hw_full_test in scripts/runner/runner_pools.json" >> "$GITHUB_STEP_SUMMARY"
