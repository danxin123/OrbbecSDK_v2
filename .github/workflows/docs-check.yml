name: Docs Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"

jobs:
  markdown-links:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --no-progress --verbose --exclude-mail ./README.md ./docs ./LiDAR_README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
