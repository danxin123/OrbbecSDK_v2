name: Docs Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"

jobs:
  markdown-links:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run docs checks
        run: bash scripts/run_docs_checks.sh
