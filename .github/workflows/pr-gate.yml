name: PR Gate

on:
  schedule:
    - cron: '0 16 * * *'   # Every day at midnight CST (UTC+8)
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: Build nohw test
        run: cmake --build build --target ob_nohw_full_test --parallel 4

      - name: Build playback smoke test
        run: cmake --build build --target ob_playback_smoke_test --parallel 4

      - name: Install
        run: cmake --install build --prefix build/install

      - name: Run no-hardware full test
        run: |
          mkdir -p reports
          BINARY=$(find build/install -name ob_nohw_full_test -type f | head -n 1)
          echo "Found binary: $BINARY"
          # Locate built extensions directory and run from its parent so the SDK finds extensions/
          EXT_DIR=$(find build/install -path "*/extensions/filters" -type d | head -n 1)
          if [ -n "$EXT_DIR" ]; then
            EXT_PARENT=$(dirname "$(dirname "$EXT_DIR")")
            echo "Found extensions: $EXT_PARENT/extensions"
            cd "$EXT_PARENT"
          fi
          "$GITHUB_WORKSPACE/$BINARY" --gtest_output=xml:"$GITHUB_WORKSPACE/reports/nohw_junit.xml"

      - name: Run playback smoke test
        run: |
          BAG_PATH=$(find tests/resource/rosbag -maxdepth 1 -name '*.bag' | head -n 1)
          if [ -z "$BAG_PATH" ]; then
            echo "No .bag file found in tests/resource/rosbag"
            exit 1
          fi
          BINARY=$(find build/install -name ob_playback_smoke_test -type f | head -n 1)
          if [ -z "$BINARY" ]; then
            echo "ob_playback_smoke_test not found under build/install"
            exit 1
          fi
          echo "Found binary: $BINARY"
          echo "Using bag: $BAG_PATH"
          "$GITHUB_WORKSPACE/$BINARY" "$GITHUB_WORKSPACE/$BAG_PATH"

      - name: Upload nohw JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nohw-junit-linux-${{ github.run_id }}
          path: reports/nohw_junit.xml
          retention-days: 14

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure
        run: |
          cmake -S . -B build `
            -DOB_BUILD_TESTS=ON `
            -DOB_BUILD_EXAMPLES=OFF `
            -DOB_BUILD_TOOLS=OFF `
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Build nohw test
        run: cmake --build build --target ob_nohw_full_test --config Release

      - name: Build playback smoke test
        run: cmake --build build --target ob_playback_smoke_test --config Release

      - name: Install
        run: cmake --install build --config Release --prefix build/install

      - name: Run no-hardware full test
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null
          $binary = Get-ChildItem -Recurse -Path build/install -Filter ob_nohw_full_test.exe | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Found binary: $binary"
          # Locate built extensions directory and run from its parent so the SDK finds extensions/
          $extDir = Get-ChildItem -Recurse -Path build/install -Directory -Filter filters | Where-Object { $_.FullName -match 'extensions[\\/]filters$' } | Select-Object -First 1
          if ($extDir) {
            $extParent = Split-Path (Split-Path $extDir.FullName)
            Write-Host "Found extensions: $(Split-Path $extDir.FullName)"
            Push-Location $extParent
          }
          & $binary --gtest_output=xml:"$env:GITHUB_WORKSPACE\reports\nohw_junit.xml"
          if ($extDir) { Pop-Location }

      - name: Run playback smoke test
        run: |
          $bag = Get-ChildItem -Path tests/resource/rosbag -Filter *.bag -File | Select-Object -First 1 -ExpandProperty FullName
          if (-not $bag) {
            Write-Error "No .bag file found in tests/resource/rosbag"
            exit 1
          }
          $binary = Get-ChildItem -Recurse -Path build/install -Filter ob_playback_smoke_test.exe | Select-Object -First 1 -ExpandProperty FullName
          if (-not $binary) {
            Write-Error "ob_playback_smoke_test.exe not found under build/install"
            exit 1
          }
          Write-Host "Found binary: $binary"
          Write-Host "Using bag: $bag"
          & $binary $bag

      - name: Upload nohw JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nohw-junit-windows-${{ github.run_id }}
          path: reports/nohw_junit.xml
          retention-days: 14

