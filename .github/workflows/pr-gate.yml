name: PR Gate

on:
  pull_request:
  push:
    branches: [main, develop, release/*]
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build -j

      - name: Build nohw test
        run: cmake --build build --target ob_nohw_full_test -j

      - name: Run no-hardware full test
        run: |
          mkdir -p reports
          find build -name ob_nohw_full_test -type f
          ./build/nohw_full_test/ob_nohw_full_test --gtest_output=xml:reports/nohw_junit.xml

      - name: Upload nohw JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nohw-junit-${{ github.run_id }}
          path: reports/nohw_junit.xml
          retention-days: 14

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build `
            -DOB_BUILD_TESTS=ON `
            -DOB_BUILD_EXAMPLES=OFF `
            -DOB_BUILD_TOOLS=OFF `
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Build nohw test
        run: cmake --build build --target ob_nohw_full_test --config Release

      - name: Run no-hardware full test
        run: |
          if not exist reports mkdir reports
          dir /s /b build\*ob_nohw_full_test.exe
          build\nohw_full_test\Release\ob_nohw_full_test.exe --gtest_output=xml:reports/nohw_junit.xml

      - name: Upload nohw JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nohw-junit-${{ github.run_id }}
          path: reports/nohw_junit.xml
          retention-days: 14

  test-cpp-nohw:
    runs-on: ubuntu-22.04
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build nohw test
        run: cmake --build build --target ob_nohw_full_test -j

      - name: Run no-hardware full test
        run: |
          mkdir -p reports
          ./build/tests/nohw_full_test/ob_nohw_full_test \
            --gtest_output=xml:reports/nohw_junit.xml

      - name: Upload nohw JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nohw-junit-${{ github.run_id }}
          path: reports/nohw_junit.xml
          retention-days: 14

  test-playback:
    runs-on: ubuntu-22.04
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build playback smoke test
        run: cmake --build build --target ob_playback_smoke_test -j

      - name: Run playback smoke test
        run: |
          BAG_PATH=$(find tests/rosbag -maxdepth 1 -name '*.bag' | head -n 1)
          if [ -z "$BAG_PATH" ]; then
            echo "No .bag file found in tests/rosbag"
            exit 1
          fi
          echo "Using bag: $BAG_PATH"
          ./build/tests/playback_test/ob_playback_smoke_test "$BAG_PATH"
