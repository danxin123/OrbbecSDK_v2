name: PR Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build -j

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build `
            -DOB_BUILD_TESTS=ON `
            -DOB_BUILD_EXAMPLES=OFF `
            -DOB_BUILD_TOOLS=OFF `
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --config Release

  test-cpp-nohw:
    runs-on: ubuntu-22.04
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build test targets
        run: cmake --build build --target frame_test total_test align_test hdr_test -j

      - name: Verify test executables
        run: |
          test -f build/tests/frame_test/frame_test
          test -f build/tests/total_test/total_test
          test -f build/tests/align_test/align_test
          test -f build/tests/hdr_test/hdr_test
