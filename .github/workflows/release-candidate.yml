name: Release Candidate

on:
  workflow_dispatch:

jobs:
  branch-guard:
    runs-on: ubuntu-22.04
    steps:
      - name: Validate release branch
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" != release/* ]]; then
            echo "This workflow must run from release/* branches. Current: $ref" >&2
            exit 1
          fi

  rc-linux:
    needs: branch-guard
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build test targets
        run: cmake --build build --target ob_core_nohw_test ob_playback_smoke_test -j

      - name: Run core no-hardware tests
        run: ./build/tests/core_nohw_test/ob_core_nohw_test

      - name: Run playback regression
        shell: bash
        run: |
          set -euo pipefail
          BAG_PATH=$(find tests/rosbag -maxdepth 1 -name '*.bag' | head -n 1)
          if [ -z "$BAG_PATH" ]; then
            echo "No .bag file found in tests/rosbag" >&2
            exit 1
          fi
          ./build/tests/playback_test/ob_playback_smoke_test "$BAG_PATH"

  rc-docs-check:
    needs: branch-guard
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run docs checks
        run: bash scripts/run_docs_checks.sh

  rc-examples-linux:
    needs: branch-guard
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run examples smoke
        run: bash scripts/run_examples.sh

  rc-windows-build:
    needs: branch-guard
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build `
            -DOB_BUILD_TESTS=ON `
            -DOB_BUILD_EXAMPLES=OFF `
            -DOB_BUILD_TOOLS=OFF `
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --config Release

  rc-summary:
    needs: [rc-linux, rc-windows-build, rc-docs-check, rc-examples-linux]
    runs-on: ubuntu-22.04
    environment: rc-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run RC numeric policy gate
        run: |
          python3 scripts/rc_policy_gate.py \
            --reports-dir all_reports \
            --min-success-rate 98.0 \
            --allow-missing-p0 \
            --job-results "${JOB_RESULTS}" \
            --output-json reports/rc_gate_result.json \
            --output-md reports/rc_gate_result.md
        env:
          JOB_RESULTS: ${{ needs.rc-linux.result }},${{ needs.rc-windows-build.result }},${{ needs.rc-docs-check.result }},${{ needs.rc-examples-linux.result }}

      - name: Upload RC gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rc-policy-gate-${{ github.run_id }}
          path: |
            reports/rc_gate_result.json
            reports/rc_gate_result.md
          retention-days: 90

      - name: Generate release summary
        run: |
          echo "RC validation finished." >> "$GITHUB_STEP_SUMMARY"
          echo "- Linux build/no-hardware regression: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Windows build: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docs check: PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Examples smoke (Linux): PASS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat reports/rc_gate_result.md >> "$GITHUB_STEP_SUMMARY"
