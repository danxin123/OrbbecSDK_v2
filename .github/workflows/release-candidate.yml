name: Release Candidate

on:
  workflow_dispatch:

jobs:
  branch-guard:
    runs-on: ubuntu-22.04
    steps:
      - name: Validate release branch
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" != release/* ]]; then
            echo "This workflow must run from release/* branches. Current: $ref" >&2
            exit 1
          fi

  rc-linux:
    needs: branch-guard
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build test targets
        run: cmake --build build --target ob_nohw_full_test ob_playback_smoke_test -j

      - name: Run no-hardware full test
        run: |
          mkdir -p reports
          ./build/tests/nohw_full_test/ob_nohw_full_test \
            --gtest_output=xml:reports/rc_nohw_junit.xml

      - name: Run playback smoke test
        run: |
          BAG_PATH=$(find tests/rosbag -maxdepth 1 -name '*.bag' | head -n 1)
          if [ -n "$BAG_PATH" ]; then
            ./build/tests/playback_test/ob_playback_smoke_test "$BAG_PATH"
          fi

      - name: Upload rc-linux reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-linux-report-${{ github.run_id }}
          path: reports/*.xml
          retention-days: 30

  rc-windows-build:
    needs: branch-guard
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build `
            -DOB_BUILD_TESTS=ON `
            -DOB_BUILD_EXAMPLES=OFF `
            -DOB_BUILD_TOOLS=OFF `
            -DOB_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --config Release

  rc-docs-check:
    needs: branch-guard
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run docs checks
        run: bash scripts/run_docs_checks.sh

  rc-examples-linux:
    needs: branch-guard
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run examples smoke
        run: bash scripts/run_examples.sh

  rc-hw-full:
    needs: branch-guard
    runs-on: [self-hosted, linux, sdk, usb, gemini-335]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Device health check
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/device_health_check.sh
          bash scripts/device_health_check.sh

      - name: Configure
        run: |
          cmake -S . -B build \
            -DOB_BUILD_TESTS=ON \
            -DOB_BUILD_EXAMPLES=OFF \
            -DOB_BUILD_TOOLS=OFF \
            -DOB_BUILD_DOCS=OFF

      - name: Build all test targets
        run: cmake --build build --target ob_nohw_full_test ob_hw_full_test ob_playback_smoke_test -j

      - name: Run no-hardware full test
        run: |
          mkdir -p reports
          ./build/tests/nohw_full_test/ob_nohw_full_test \
            --gtest_output=xml:reports/rc_nohw_junit.xml

      - name: Run hardware full test
        env:
          HARDWARE_AVAILABLE: "true"
          DEVICE_TYPE: gemini-335
        run: |
          ./build/tests/hw_full_test/ob_hw_full_test \
            --gtest_output=xml:reports/rc_hw_junit.xml

      - name: Run playback smoke test
        run: |
          BAG_PATH=$(find tests/rosbag -maxdepth 1 -name '*.bag' | head -n 1)
          if [ -n "$BAG_PATH" ]; then
            ./build/tests/playback_test/ob_playback_smoke_test "$BAG_PATH"
          fi

      - name: Upload rc-hw reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-hw-report-${{ github.run_id }}
          path: reports/*.xml
          retention-days: 30

  rc-summary:
    needs: [rc-linux, rc-windows-build, rc-docs-check, rc-examples-linux, rc-hw-full]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*report*"
          path: all_reports/
          merge-multiple: true

      - name: Generate release summary
        run: |
          echo "## RC Validation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Linux no-HW regression: ${{ needs.rc-linux.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Windows build: ${{ needs.rc-windows-build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docs check: ${{ needs.rc-docs-check.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Examples smoke: ${{ needs.rc-examples-linux.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Hardware full test: ${{ needs.rc-hw-full.result }}" >> "$GITHUB_STEP_SUMMARY"