name: Update Dashboard

on:
  workflow_run:
    workflows: ["PR Gate", "Daily HW Smoke", "Nightly Regression"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  update-dashboard:
    if: github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build report payload from workflow result
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          python3 - << 'PY'
          import io
          import json
          import os
          import zipfile
          import urllib.request
          import xml.etree.ElementTree as ET


          def api_get_json(url: str):
            req = urllib.request.Request(
              url,
              headers={
                "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(req, timeout=60) as resp:
              return json.loads(resp.read().decode("utf-8"))


          def api_get_bytes(url: str) -> bytes:
            req = urllib.request.Request(
              url,
              headers={
                "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(req, timeout=120) as resp:
              return resp.read()


          def parse_junit_xml(xml_bytes: bytes):
            root = ET.fromstring(xml_bytes)
            testcases = root.findall(".//testcase")
            total = len(testcases)
            failed_names = []

            for tc in testcases:
              has_failure = tc.find("failure") is not None or tc.find("error") is not None
              if has_failure:
                classname = (tc.attrib.get("classname") or "").strip()
                name = (tc.attrib.get("name") or "unknown_case").strip()
                failed_names.append(f"{classname}.{name}" if classname else name)

            return total, failed_names


          def build_report_from_artifacts():
            repo = os.environ["REPO"]
            run_id = os.environ["RUN_ID"]
            conclusion = os.environ["CONCLUSION"]
            artifacts_api = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100"
            payload = api_get_json(artifacts_api)

            junit_artifacts = []
            for item in payload.get("artifacts", []):
              name = item.get("name", "")
              if name.startswith("nohw-junit-") and not item.get("expired", False):
                junit_artifacts.append(item)

            total_cases = 0
            failed_case_names = []

            for art in junit_artifacts:
              archive_url = art.get("archive_download_url")
              if not archive_url:
                continue
              try:
                zip_bytes = api_get_bytes(archive_url)
                with zipfile.ZipFile(io.BytesIO(zip_bytes)) as zf:
                  for member in zf.namelist():
                    if member.lower().endswith(".xml"):
                      t, failed = parse_junit_xml(zf.read(member))
                      total_cases += t
                      failed_case_names.extend(failed)
              except Exception as e:
                failed_case_names.append(f"artifact_parse_error:{art.get('name', 'unknown')}:{type(e).__name__}")

            failed_case_names = sorted(set(failed_case_names))

            if total_cases <= 0:
              if conclusion == "success":
                return {
                  "total_cases": 1,
                  "passed_cases": 1,
                  "failed_cases": 0,
                  "failed_case_names": [],
                }
              return {
                "total_cases": 1,
                "passed_cases": 0,
                "failed_cases": 1,
                "failed_case_names": [f"workflow_{conclusion}_without_junit"],
              }

            failed_cases = len(failed_case_names)
            passed_cases = max(total_cases - failed_cases, 0)
            return {
              "total_cases": total_cases,
              "passed_cases": passed_cases,
              "failed_cases": failed_cases,
              "failed_case_names": failed_case_names,
            }


          report = build_report_from_artifacts()

          with open("report.json", "w", encoding="utf-8") as f:
            json.dump(report, f, ensure_ascii=False, indent=2)
          PY

      - name: Update dashboard data
        run: |
          python3 scripts/update_dashboard.py \
            --report report.json \
            --data docs/dashboard/data.json \
            --workflow "${{ github.event.workflow_run.name }}"

      - name: Commit data update
        run: |
          set -euo pipefail

          # Persist generated data from current checkout.
          TMP_DATA="$(mktemp)"
          cp docs/dashboard/data.json "$TMP_DATA"

          # Use an isolated worktree for gh-pages to avoid checkout conflicts.
          TMP_WT="$(mktemp -d)"
          cleanup() {
            git worktree remove "$TMP_WT" --force >/dev/null 2>&1 || true
            rm -f "$TMP_DATA" || true
          }
          trap cleanup EXIT

          git fetch origin gh-pages
          git worktree add --detach "$TMP_WT" origin/gh-pages

          mkdir -p "$TMP_WT/docs/dashboard"
          cp "$TMP_DATA" "$TMP_WT/docs/dashboard/data.json"

          pushd "$TMP_WT" >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes"
            popd >/dev/null
            exit 0
          fi
          git commit -m "ci: update dashboard data"

          # Retry once if another run updates gh-pages concurrently.
          if ! git push origin HEAD:gh-pages; then
            echo "First push failed; retrying after rebasing onto latest origin/gh-pages..."
            git fetch origin gh-pages
            git rebase origin/gh-pages
            git push origin HEAD:gh-pages
          fi
          popd >/dev/null
