name: Update Dashboard

on:
  workflow_run:
    workflows: ["PR Gate", "Daily HW Smoke", "Nightly Regression"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  update-dashboard:
    if: github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build report payload from workflow result
        run: |
          python3 - << 'PY'
          import json
          import os

          conclusion = "${{ github.event.workflow_run.conclusion }}"
          if conclusion == "success":
            report = {
              "total_cases": 1,
              "passed_cases": 1,
              "failed_cases": 0,
              "failed_case_names": []
            }
          else:
            report = {
              "total_cases": 1,
              "passed_cases": 0,
              "failed_cases": 1,
              "failed_case_names": [f"workflow_{conclusion}"]
            }

          with open("report.json", "w", encoding="utf-8") as f:
            json.dump(report, f, ensure_ascii=False, indent=2)
          PY

      - name: Update dashboard data
        run: |
          python3 scripts/update_dashboard.py \
            --report report.json \
            --data docs/dashboard/data.json \
            --workflow "${{ github.event.workflow_run.name }}"

      - name: Commit data update
        run: |
          set -euo pipefail

          # Persist generated data from current checkout.
          TMP_DATA="$(mktemp)"
          cp docs/dashboard/data.json "$TMP_DATA"

          # Use an isolated worktree for gh-pages to avoid checkout conflicts.
          TMP_WT="$(mktemp -d)"
          cleanup() {
            git worktree remove "$TMP_WT" --force >/dev/null 2>&1 || true
            rm -f "$TMP_DATA" || true
          }
          trap cleanup EXIT

          git fetch origin gh-pages
          git worktree add --detach "$TMP_WT" origin/gh-pages

          mkdir -p "$TMP_WT/docs/dashboard"
          cp "$TMP_DATA" "$TMP_WT/docs/dashboard/data.json"

          pushd "$TMP_WT" >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes"
            popd >/dev/null
            exit 0
          fi
          git commit -m "ci: update dashboard data"

          # Retry once if another run updates gh-pages concurrently.
          if ! git push origin HEAD:gh-pages; then
            echo "First push failed; retrying after rebasing onto latest origin/gh-pages..."
            git fetch origin gh-pages
            git rebase origin/gh-pages
            git push origin HEAD:gh-pages
          fi
          popd >/dev/null
