name: Update Dashboard

on:
  workflow_run:
    workflows: ["PR Gate", "Daily HW Smoke", "Nightly Regression"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  update-dashboard:
    if: github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build report payload from workflow result
        run: |
          python3 - << 'PY'
          import json
          import os

          conclusion = "${{ github.event.workflow_run.conclusion }}"
          if conclusion == "success":
            report = {
              "total_cases": 1,
              "passed_cases": 1,
              "failed_cases": 0,
              "failed_case_names": []
            }
          else:
            report = {
              "total_cases": 1,
              "passed_cases": 0,
              "failed_cases": 1,
              "failed_case_names": [f"workflow_{conclusion}"]
            }

          with open("report.json", "w", encoding="utf-8") as f:
            json.dump(report, f, ensure_ascii=False, indent=2)
          PY

      - name: Update dashboard data
        run: |
          python3 scripts/update_dashboard.py \
            --report report.json \
            --data docs/dashboard/data.json \
            --workflow "${{ github.event.workflow_run.name }}"

      - name: Commit data update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Persist generated data before switching branch context.
          TMP_DATA="$(mktemp)"
          cp docs/dashboard/data.json "$TMP_DATA"

          # Always commit on top of remote gh-pages to avoid non-fast-forward from main/default branch.
          git fetch origin gh-pages
          git checkout -B gh-pages origin/gh-pages
          mkdir -p docs/dashboard
          cp "$TMP_DATA" docs/dashboard/data.json

          git add docs/dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "ci: update dashboard data"

          # Retry once if another run updates gh-pages concurrently.
          if ! git push origin HEAD:gh-pages; then
            echo "First push failed; retrying after rebasing onto latest origin/gh-pages..."
            git fetch origin gh-pages
            git rebase origin/gh-pages
            git push origin HEAD:gh-pages
          fi
