name: Update Dashboard

on:
  workflow_run:
    workflows: ["PR Gate"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  update-dashboard:
    if: github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare sample report payload
        run: |
          cat > report.json << 'JSON'
          {
            "total_cases": 1,
            "passed_cases": 1,
            "failed_cases": 0,
            "failed_case_names": []
          }
          JSON

      - name: Update dashboard data
        run: |
          python3 scripts/update_dashboard.py \
            --report report.json \
            --data docs/dashboard/data.json \
            --workflow "${{ github.event.workflow_run.name }}"

      - name: Commit data update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard/data.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "ci: update dashboard data"
          git push origin HEAD:gh-pages
